name: Deploy Azure Terraform

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  WORKING_DIR: terraform

jobs:
  init:
    name: init
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: >
          terraform init
          -backend-config="resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP }}"
          -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}"
          -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}"
          -backend-config="key=${{ secrets.TFSTATE_KEY }}"

  validate:
    name: validate
    runs-on: ubuntu-latest
    needs: init
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: >
          terraform init
          -backend-config="resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP }}"
          -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}"
          -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}"
          -backend-config="key=${{ secrets.TFSTATE_KEY }}"

      - name: Terraform validate
        run: terraform validate

  plan:
    name: plan
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: >
          terraform init
          -backend-config="resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP }}"
          -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}"
          -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}"
          -backend-config="key=${{ secrets.TFSTATE_KEY }}"

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

  apply:
    name: apply
    runs-on: ubuntu-latest
    needs: plan
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: >
          terraform init
          -backend-config="resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP }}"
          -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}"
          -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}"
          -backend-config="key=${{ secrets.TFSTATE_KEY }}"

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan